<nav id="mainNav" class="navbar navbar-default navbar-fixed-top">
    {% if page.url == '/' or page.url == '/index.html' or page.layout == 'front' %}
    <video id="navbar-video"
           class="navbar-video-background"
           autoplay
           muted
           loop
           playsinline
           webkit-playsinline
           preload="metadata">
        <source src="{{ '/assets/video/hero-pingpong-mobile.mp4' | relative_url }}" type="video/mp4">
    </video>
    {% endif %}
    <div class="container-fluid navbar-content-wrapper">
        <!-- Brand and toggle get grouped for better mobile display -->
        <div class="navbar-header">
            <button type="button" class="navbar-toggle collapsed" data-toggle="collapse" data-target="#bs-example-navbar-collapse-1">
                <span class="sr-only">
                    Toggle navigation
                </span>
                <span class="icon-bar"></span>
                <span class="icon-bar"></span>
                <span class="icon-bar"></span>
            </button>
            <div class="brand-container">
                <a class="navbar-brand" href="{{ '/' | relative_url }}">
                    <img src="{{ '/assets/projects/mia/images/logoAtomic3.png' | relative_url }}" alt="Atomic AI Logo" class="navbar-logo">
                    Atomic AI
                </a>
                <div class="language-selector brand-lang-selector">
                    <button class="lang-btn" id="langBtn" aria-label="Select Language">
                        <span class="lang-current" id="currentLang">EN</span>
                    </button>
                    <div class="lang-dropdown" id="langDropdown">
                        <a href="#" class="lang-option active" data-lang="en">
                            <span class="lang-flag">🇬🇧</span>
                            <span>English</span>
                        </a>
                        <a href="#" class="lang-option" data-lang="es">
                            <span class="lang-flag">🇪🇸</span>
                            <span>Español</span>
                        </a>
                        <a href="#" class="lang-option" data-lang="fr">
                            <span class="lang-flag">🇫🇷</span>
                            <span>Français</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Collect the nav links, forms, and other content for toggling -->
        <div class="collapse navbar-collapse" id="bs-example-navbar-collapse-1">
            <ul class="nav navbar-nav navbar-right">
                <li>
                    <a href="{{ '/services' | relative_url }}">Solutions</a>
                </li>
                <li>
                    <a href="{{ '/projects' | relative_url }}">Case Studies</a>
                </li>
                <li>
                    <a href="{{ '/how-we-work' | relative_url }}">How We Work</a>
                </li>
                <li>
                    <a href="{{ '/about' | relative_url }}">Company</a>
                </li>
                <li>
                    <a href="{{ '/contact' | relative_url }}">Book a Call</a>
                </li>
            </ul>
        </div>
        <!-- /.navbar-collapse -->
    </div>
    <!-- /.container-fluid /.navbar-content-wrapper -->
</nav>
